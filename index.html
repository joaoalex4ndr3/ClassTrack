<!DOCTYPE html>
<html lang="pt-BR">
 
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login e Cadastro</title>
    <link rel="stylesheet" href="index.css" />
</head>
 
<body>
 
    <div class="bg-aurora">
        <div class="aurora-orb orb1"></div>
        <div class="aurora-orb orb2"></div>
        <div class="aurora-orb orb3"></div>
    </div>
 
    <header>
        <div class="header-inner">
            <a href="Lading.html" class="logo-link">
                <img src="Assets\logoClass.png" alt="Logo do Projeto" id="logo">
            </a>
            <div class="header-accent-line"></div>
        </div>
    </header>
 
    <main>
        <section id="choice-section">
            <h2 class="choice-title">Escolha seu tipo de acesso</h2>
            <div class="roles-container">
                <div class="role-card aluno" onclick="selectRole('Aluno')">
                    <div class="overlay">
                        <h3>Aluno</h3>
                    </div>
                </div>
                <div class="role-card professor" onclick="selectRole('Professor')">
                    <div class="overlay">
                        <h3>Professor</h3>
                    </div>
                </div>
                <div class="role-card direcao" onclick="selectRole('Direção')">
                    <div class="overlay">
                        <h3>Direção</h3>
                    </div>
                </div>
            </div>
        </section>
 
        <section id="form-section" class="card hidden">
            <p id="selected-role"></p>
            <div class="tabs">
                <button id="login-tab" class="active" onclick="showLogin()">Login</button>
                <button id="register-tab" onclick="showRegister()">Cadastro</button>
            </div>
 
            <form id="login-form">
                <h2>Login</h2>
                <input type="email" id="login-email" placeholder="E-mail Gmail" />
                <input type="password" id="login-password" placeholder="Senha" />
                <p class="error" id="login-error"></p>
                <button type="submit">Entrar</button>
            </form>
 
            <form id="register-form" class="hidden">
                <h2>Cadastro</h2>
                <input type="text" id="cpf" placeholder="CPF" maxlength="14" />
                <input type="text" id="phone" placeholder="Número de telefone" />
                <input type="text" id="fullname" placeholder="Nome completo" />
                <input type="email" id="email" placeholder="E-mail Gmail" />
                <input type="password" id="password" placeholder="Senha" />
                <input type="password" id="confirm-password" placeholder="Confirmar senha" />
                <p class="error" id="register-error"></p>
                <p class="success" id="register-success"></p>
                <button type="submit">Cadastrar</button>
            </form>
        </section>
    </main>
 
    <script src="index.js"></script>
</body>
 
</html>
