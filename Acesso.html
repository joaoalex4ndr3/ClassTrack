<!DOCTYPE html>
<html lang="pt-BR">
 
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - ClassTrack</title>
    <link rel="stylesheet" href="Acesso.css" />
</head>
 
<body>
 
    <div class="bg-aurora">
        <div class="aurora-orb orb1"></div>
        <div class="aurora-orb orb2"></div>
        <div class="aurora-orb orb3"></div>
    </div>
 
    <header>
        <div class="header-inner">
            <a href="index.html" class="logo-link">
                <img src="Assets/logoClass.png" alt="Logo do Projeto" id="logo">
            </a>
            <div class="header-accent-line"></div>
        </div>
    </header>
 
    <main>
 
        <section id="choice-section">
            <h2 class="choice-title">Escolha seu tipo de acesso</h2>
            <div class="roles-container">
                <div class="role-card aluno" onclick="selectRole('Aluno')">
                    <div class="overlay"><h3>Aluno</h3></div>
                </div>
                <div class="role-card professor" onclick="selectRole('Professor')">
                    <div class="overlay"><h3>Professor</h3></div>
                </div>
                <div class="role-card direcao" onclick="selectRole('Direção')">
                    <div class="overlay"><h3>Direção</h3></div>
                </div>
            </div>
        </section>
 
        <section id="form-section" class="card hidden">
            <p id="selected-role"></p>
            <form id="login-form">
                <h2>Login</h2>
                <input type="text" id="login-cpf" placeholder="CPF" maxlength="14" />
                <input type="password" id="login-password" placeholder="Senha" />
                <div class="forgot-password">
                    <a href="#">Esqueci minha senha</a>
                </div>
                <p class="error" id="login-error"></p>
                <button type="submit">Entrar</button>
            </form>
        </section>
 
    </main>
 
    <script src="Acesso.js"></script>
</body>
</html>
